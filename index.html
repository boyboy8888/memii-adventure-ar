<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #FF6B6B; color: white;
            border: none; border-radius: 50px; font-size: 20px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <button id="start-button">แตะเพื่อเริ่มดู AR</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid1" src="./vdo1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid2" src="./vdo2.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid3" src="./vdo3.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid1" width="0.63" height="1.12" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-video src="#vid2" width="0.63" height="1.12" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2">
            <a-video src="#vid3" width="0.63" height="1.12" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene> <script>
        const startButton = document.querySelector('#start-button');
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
            // เริ่มระบบ AR และสั่ง Play วิดีโอทั้งหมดแบบ Muted ทิ้งไว้ก่อน
            sceneEl.systems["mindar-image-system"].start();
            const allVideos = document.querySelectorAll('video');
            allVideos.forEach(v => {
                v.play().then(() => {
                    v.pause(); // สั่งหยุดไว้ก่อนเพื่อให้พร้อมทำงานตอนสแกนเจอ
                }).catch(e => console.log("Video setup error:", e));
            });
            startButton.style.display = 'none';
        });

        sceneEl.addEventListener("targetFound", event => {
            const index = event.detail.index;
            const vids = ["#vid1", "#vid2", "#vid3"];
            const currentVideo = document.querySelector(vids[index]);
            if (currentVideo) {
                currentVideo.muted = false; 
                currentVideo.play();
            }
        });

        sceneEl.addEventListener("targetLost", event => {
            const index = event.detail.index;
            const vids = ["#vid1", "#vid2", "#vid3"];
            const currentVideo = document.querySelector(vids[index
