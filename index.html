<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #FF6B6B; color: white;
            border: none; border-radius: 50px; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <button id="start-button">เปิดกล้องส่อง Memii Adventure</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid1" src="./vdo1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid2" src="./vdo2.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid3" src="./vdo3.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid1" width="0.63" height="1.12" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 1">
            <a-video src="#vid2" width="0.63" height="1.12" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 2">
            <a-video src="#vid3" width="0.63" height="1.12" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const sceneEl = document.querySelector('a-scene');
        const vids = ["#vid1", "#vid2", "#vid3"];

        startButton.addEventListener('click', () => {
            // เริ่มระบบ AR
            sceneEl.systems["mindar-image-system"].start(); 

            // ปลดล็อกวิดีโอทุกตัว (Play แล้ว Pause ทันที)
            vids.forEach(id => {
                const v = document.querySelector(id);
                if (v) {
                    v.play().then(() => {
                        v.pause();
                        v.currentTime = 0;
                    }).catch(e => console.log("Unlock error:", e));
                }
            });
            startButton.style.display = 'none';
        });

        sceneEl.addEventListener("targetFound", event => {
            const index = event.detail.index;
            const currentVideo = document.querySelector(vids[index]);
            if (currentVideo) {
                // บังคับ Muted อีกครั้งเพื่อให้มั่นใจว่าเล่นแน่นอน
                currentVideo.muted = true; 
                currentVideo.play().catch(e => {
                    console.log("Play error:", e);
                    // ถ้ายังไม่เล่น ให้ลองแตะหน้าจอเพื่อ Play
                });
                
                // ลองเปิดเสียงหลังจาก Play ไปแล้ว 1 วินาที (บางเครื่องยอม)
                setTimeout(() => { currentVideo.muted = false; }, 1000);
            }
        });

        sceneEl.addEventListener("targetLost", event => {
            const index = event.detail.index;
            const currentVideo = document.querySelector(vids[index]);
            if (currentVideo) {
                currentVideo.pause();
            }
        });
    </script>
</body>
</html>
