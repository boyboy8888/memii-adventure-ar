<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #start-button {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; padding: 20px 40px; background: #FF6B6B; color: white;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="start-button">กดเพื่อเล่น ARVideo</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid1" src="./vdo1.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid2" src="./vdo2.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid3" src="./vdo3.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid4" src="./vdo4.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid5" src="./vdo5.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
            <video id="vid6" src="./vdo6.mp4" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#vid1" width="1.12" height="2" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 1">
            <a-video src="#vid2" width="1.12" height="2" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 2">
            <a-video src="#vid3" width="1.12" height="2" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 3">
            <a-video src="#vid4" width="1.12" height="2" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 4">
            <a-video src="#vid5" width="1.12" height="2" position="0 0 0"></a-video>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 5">
            <a-video src="#vid6" width="1.12" height="2" position="0 0 0"></a-video>
        </a-entity>
       
    </a-scene>

    <script>
        const startButton = document.querySelector('#start-button');
        const sceneEl = document.querySelector('a-scene');
        const vids = [document.querySelector('#vid1'),
                      document.querySelector('#vid2'),
                      document.querySelector('#vid3'),
                      document.querySelector('#vid4'),
                      document.querySelector('#vid5'),
                      document.querySelector('#vid6')];

        // 1. ทริคแก้ปัญหา Android/iPhone: ต้องสั่งเล่นวิดีโอทันทีที่มีการคลิกปุ่ม
        startButton.addEventListener('click', () => {
            sceneEl.systems["mindar-image-system"].start();
            vids.forEach(v => {
                if(v) {
                    v.play(); // สั่งรันวิดีโอไปเลยตั้งแต่ตอนกดปุ่ม (แบบ Muted)
                }
            });
            startButton.style.display = 'none';
        });

        // 2. เมื่อสแกนเจอ ให้เปิดเสียง (ถ้าต้องการ)
        sceneEl.addEventListener("targetFound", event => {
            const index = event.detail.index;
            if (vids[index]) {
                vids[index].muted = false; // ปลดล็อกเสียงเมื่อสแกนติด
                vids[index].play(); // ย้ำคำสั่งเล่นอีกครั้ง
            }
        });

        // 3. เมื่อสแกนหลุด ให้หยุด
        sceneEl.addEventListener("targetLost", event => {
            const index = event.detail.index;
            if (vids[index]) vids[index].pause();
        });
    </script>
</body>
</html>
